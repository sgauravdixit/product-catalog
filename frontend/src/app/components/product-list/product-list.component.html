<div class="page-header">
  <h1>All Products</h1>
  <span class="product-count" *ngIf="!loading && !error">{{ products.length }} products</span>
</div>

<div class="loading" *ngIf="loading">
  <div class="spinner"></div>
  <p>Loading products...</p>
</div>

<div class="error-message" *ngIf="error">
  <p>{{ error }}</p>
  <button (click)="loadProducts()" class="btn-retry">Retry</button>
</div>

<div class="products-grid" *ngIf="!loading && !error">
  <div class="empty-state" *ngIf="products.length === 0">
    <p>No products yet.</p>
    <a routerLink="/add-product" class="btn-primary">Add your first product</a>
  </div>

  <div class="product-card" *ngFor="let product of products">
    <div class="product-image-wrapper">
      <img
        [src]="product.image_url"
        [alt]="product.name"
        class="product-image"
        onerror="this.src='https://placehold.co/400x300?text=No+Image'"
      >
      <span class="product-category">{{ product.category }}</span>
    </div>
    <div class="product-body">
      <h3 class="product-name">{{ product.name }}</h3>
      <p class="product-description">{{ product.description }}</p>
      <div class="product-footer">
        <div class="product-meta">
          <span class="product-price">${{ product.price | number:'1.2-2' }}</span>
          <span class="product-stock" [class.low-stock]="product.stock < 10">
            {{ product.stock }} in stock
          </span>
        </div>
        <button class="btn-delete" (click)="deleteProduct(product.id)">Delete</button>
      </div>
    </div>
  </div>
</div>
